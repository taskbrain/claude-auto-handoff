# auto_compaction.conf — sourceable 設定 (pyyaml 非依存)。
# ★各値は `: "${VAR:=default}"` (assign-if-unset) で定義する。これにより env で渡した値が
#   source 後も保持される (`VAR=value` 無条件代入だと env override が source 時に潰れる)。
#   調整は env (例 `HANDOFF_RESTORE_FRESH_SECONDS=7200 ...`) でも本ファイル直編集でも可。
# 2段 cadence: 画面% 基準。準備(50%) → 圧縮(55%) → critical 天井(78%)。
# ★1M Opus では CLAUDE_AUTOCOMPACT_PCT_OVERRIDE が壊れている (#53801) ため、
#   native % トリガーには依存しない。daemon の send-keys が唯一確実なトリガー。
#   絶対トークン cap は撤去 (1M 窓で 20%/200k 早発火し %cadence と衝突したため)。
: "${PREPARE_PCT:=50}"
: "${COMPACT_PCT:=55}"
: "${CRITICAL_PCT:=78}"
# 多重発火抑制 (秒) — handoff writer / 汎用 debounce 窓
: "${DEBOUNCE_SECONDS:=60}"
# Stage1: 準備プロンプト (Stop hook の自筆要求) の再注入抑制窓 (秒)。
# prepared 検出 (model.md 鮮度) と併用し、1 episode 1 回に収める belt-and-suspenders。
: "${PREPARE_PROMPT_DEBOUNCE_SECONDS:=300}"
# Stage2: daemon
: "${DAEMON_INTERVAL_SECONDS:=20}"
: "${COOLDOWN_SECONDS:=120}"
# ★compacted inflight marker の TTL (秒): 圧縮送出後に立てる compacted フラグが、SessionStart 不達
#   (圧縮空振り) で恒久残留し以降一切自動圧縮されなくなる沈黙劣化を防ぐ。フラグが TTL を超え ∧ band が
#   まだ圧縮帯 (idle に落ちていない) なら daemon が clear して再評価する。既定 600s (cooldown 120s +
#   /compact 要約 90s より十分長く、誤って進行中の resume 待ちを潰さない)。
: "${COMPACTED_TTL_SECONDS:=600}"
# ★I1: /compact 送出前に入力欄へユーザーの下書きがある間、圧縮を defer する連続 tick 回数の上限。
#   下書きに /compact を連結して clobber/誤送信しないための defer だが、box 検出の false-positive
#   (将来 REPL が空欄にプレースホルダを描く等) で圧縮が恒久ブロック=context overflow=stall方向に
#   倒れるのを防ぐため上限を設け、超過したら下書きを犠牲にしても圧縮する (stall < clobber のユーザー
#   安全原則)。既定 9 (× DAEMON_INTERVAL_SECONDS 20s ≒ 3 分の猶予)。0 で defer 無効 (常に即圧縮)。
: "${COMPACT_DEFER_MAX:=9}"
# ★システム起因の圧縮に使うコマンド。既定 /compact (source=compact が曖昧さゼロの復元信号で
#   native 要約が安全網になる)。1M 文脈で /compact が不発の場合のみ /clear にフォールバックする
#   (復元は compaction-resume でフラグ非依存化済みのため /clear 経路でも成立)。
: "${COMPACTION_COMMAND:=/compact}"
# ★圧縮後の入力欄再準備待ち (秒): 圧縮コマンド送出後、入力欄が再準備されるまでの最低待機。大
#   context のリロード/要約は時間がかかり、短すぎると継続プロンプト+Enter が入力欄準備前に届き
#   Enter を取りこぼす (テキストだけ残る = ユーザー実報告)。この最低待機の後、pane idle (= 入力欄
#   準備完了) を RESUME_MAX_WAIT_SECONDS まで poll してから継続プロンプトを送る。
: "${RESUME_DELAY_SECONDS:=${CLEAR_RESUME_DELAY_SECONDS:-12}}"
# ★圧縮完了 poll の総上限 (秒): /compact は LLM 要約のため /clear より長め (既定 90)。timeout でも
#   degrade で継続プロンプトを送る (送らないより送る)。
: "${RESUME_MAX_WAIT_SECONDS:=${CLEAR_RESUME_MAX_WAIT_SECONDS:-90}}"
# 旧名 CLEAR_RESUME_DELAY_SECONDS / CLEAR_RESUME_MAX_WAIT_SECONDS は『env override 入力専用』。
# 実コードは RESUME_DELAY_SECONDS / RESUME_MAX_WAIT_SECONDS のみ参照し、旧名を env で渡すと上の :=
# マッピング経由で新名に伝播する。conf 側で旧名に既定値は与えない (新名既定 12/90 が唯一の真実源で
# 非対称を排除する)。
# ★継続プロンプトのテキスト送出後、入力欄に貼り付けが着地するまでの settle (秒)。早すぎる Enter は
#   多バイト貼り付けの途中で partial-submit を起こす。テキストと Enter を分離して送る修正の一部。
: "${RESUME_SETTLE_SECONDS:=2}"
# ★追加 Enter (取りこぼしガード) の間隔 (秒)。入力欄に継続プロンプトが残る間、この間隔で再 Enter を撃つ。
: "${RESUME_SUBMIT_INTERVAL:=2}"
# ★継続プロンプト追加 Enter の最大回数: 分離送出した最初の Enter が取りこぼされた場合に備え、入力欄
#   (───罫線間) に継続プロンプトが残留する間、最大この回数まで追加 Enter を撃つ。残留消失 (= 送信成功で
#   入力欄クリア) / busy / capture 不能 で停止。空入力欄への単独 Enter は no-op のため余剰 Enter は無害。
: "${RESUME_REENTER_MAX:=5}"
# ★鮮度ゲート (秒): state ファイルの mtime がこれより古い (= 終了済/放棄セッションの残骸、
#   旧ロジックの stale band 固着) は daemon が一切触らない。live セッションは statusLine が
#   頻繁に state を更新するため、この窓内なら fresh と判定する。stale 大量 /clear の防止。
: "${STATE_FRESH_SECONDS:=180}"
# ★復元の鮮度ゲート (秒): compaction-resume が handoff を再注入するのは handoff mtime が
#   これより新しいときだけ。pane 基軸キーは同一 pane を順次使う別セッション間でキーを共有
#   しうるため、何時間も前の死んだ占有者の handoff を誤復元しないようにする。正当な /clear
#   復元は prepare band の各 Stop で handoff が再書込され直近 (分単位) のため 30分で十分吸収。
: "${HANDOFF_RESTORE_FRESH_SECONDS:=1800}"
# ★age ベース GC 閾値 (日): ctx_gc が mtime でこれより古い孤立ファイルを削除する。
#   age GC が無く ~/.claude/auto-compaction/ にゴミが蓄積していた + pane 基軸キー移行で
#   旧 UUID キーのファイルが孤立するため。DISABLED kill switch は age に関わらず保持。
: "${GC_STATE_DAYS:=1}"
: "${GC_HANDOFF_DAYS:=7}"
: "${GC_MARKER_DAYS:=1}"
: "${GC_ARCHIVE_DAYS:=14}"
# 既定ウィンドウ (statusLine が context_window_size を出さない場合のフォールバック)
: "${DEFAULT_WINDOW_TOKENS:=200000}"
# ★P1b: handoff の NEXT STEPS 節が薄い (具体的な次の一手が無い) と判定する非空白文字数の下限。
#   Stage3 (compaction-resume) が薄い NEXT STEPS を検出したら additionalContext に補強ガイダンスを
#   追加する (warn-only、圧縮も復元も止めない純テキスト)。0 で薄さ警告を無効化 (常に not-thin 扱い)。
: "${NEXT_STEPS_MIN_CHARS:=40}"
